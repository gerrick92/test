{% extends "base.html" %}
{% block title %}WoW Database Explorer{% endblock %}
{% block body_class %}{{ body_class }}{% endblock %}
{% block content %}
<main class="portal-home" aria-label="WoW Database Explorer home">
  <h1 class="sr-only">WoW Database Explorer</h1>
  <section class="portal-stage" aria-label="Choose expansion">
    <img class="portal-art" src="{{ url_for('static', filename='img/homepage.png') }}" alt="Dark Portal with World of Warcraft expansion logos">

    <a class="portal-hitbox portal-hitbox-classic" href="{{ url_for('expansion_page', expansion='vanilla') }}" aria-label="Open World of Warcraft Classic"></a>
    <a class="portal-hitbox portal-hitbox-tbc" href="{{ url_for('expansion_page', expansion='tbc') }}" aria-label="Open The Burning Crusade"></a>
    <a class="portal-hitbox portal-hitbox-wotlk" href="{{ url_for('expansion_page', expansion='wotlk') }}" aria-label="Open Wrath of the Lich King"></a>
  </section>
</main>
{% endblock %}
