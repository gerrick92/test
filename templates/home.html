{% extends "base.html" %}
{% block title %}WoW Database Explorer{% endblock %}
{% block body_class %}page-home{% endblock %}
{% block content %}
<main class="landing">
  <div class="landing-overlay">
    <p class="landing-kicker">Offline MaNGOS Database</p>
    <h1>WoW Database Explorer</h1>
    <p class="landing-subtitle">{{ total }} local entries loaded</p>
    <section class="expansion-select">
      <a class="expansion-card" href="{{ url_for('expansion_page', expansion='vanilla') }}"><img src="/static/img/vanilla_logo_large.webp" alt="World of Warcraft Classic"></a>
      <a class="expansion-card" href="{{ url_for('expansion_page', expansion='tbc') }}"><img src="/static/img/tbc_logo_large.jpg" alt="The Burning Crusade"></a>
      <a class="expansion-card" href="{{ url_for('expansion_page', expansion='wotlk') }}"><img src="/static/img/wotlk_logo_large.jpg" alt="Wrath of the Lich King"></a>
      <a class="all-data-card" href="{{ url_for('expansion_page', expansion='all') }}">All Data</a>
    </section>
  </div>
</main>
{% endblock %}
