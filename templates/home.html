{% extends "base.html" %}
{% block title %}WoW Database Explorer{% endblock %}
{% block body_class %}{{ body_class }}{% endblock %}
{% block content %}
<main class="portal-home" aria-labelledby="home-title">
  <h1 id="home-title" class="sr-only">WoW Database Explorer</h1>


  <section class="portal-stage" aria-label="Choose expansion">
    <img class="portal-image" src="{{ url_for('static', filename='img/main_portal.webp') }}" alt="Dark Portal with Classic, The Burning Crusade and Wrath of the Lich King logos">
    <nav class="portal-hotspots" aria-label="Expansion links">
      <a class="portal-hotspot portal-hotspot-vanilla" href="{{ url_for('expansion_page', expansion='vanilla') }}">
        <span>World of Warcraft Classic</span>
      </a>
      <a class="portal-hotspot portal-hotspot-tbc" href="{{ url_for('expansion_page', expansion='tbc') }}">
        <span>The Burning Crusade</span>
      </a>
      <a class="portal-hotspot portal-hotspot-wotlk" href="{{ url_for('expansion_page', expansion='wotlk') }}">
        <span>Wrath of the Lich King</span>
      </a>
    </nav>
  </section>
</main>
{% endblock %}
